[server]
host = "127.0.0.1"
port = 5317

# API access tokens; leave empty to disable authentication
# [[server.api_tokens]]
# token = "sk-your-token"
# description = "local dev"

# Email login example
[[accounts]]
email = "user1@example.com"
mobile = ""
area_code = ""
password = "pass1"

# China mobile login example
[[accounts]]
email = ""
mobile = "13800138000"
area_code = "+86"
password = "pass2"

# International mobile login example
[[accounts]]
email = ""
mobile = "1234567890"
area_code = "+1"
password = "pass3"

[deepseek]
# Known-good User-Agent
# user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36"

# API base URL (default)
# api_base = "https://chat.deepseek.com/api/v0"

# Full WASM asset URL (required for PoW; version changes — update manually)
# wasm_url = "https://fe-static.deepseek.com/chat/static/sha3_wasm_bg.7b9ca65ddd.wasm"

# X-Client-Version header (expert model features, etc.)
# client_version = "1.8.0"

# X-Client-Platform header
# client_platform = "web"

# Supported model types; default ["default", "expert"]
# Each type maps to an OpenAI model id: deepseek-<type>
# model_types = ["default", "expert"]
# max_input_tokens = [1048576, 1048576]
# max_output_tokens = [384000, 384000]
